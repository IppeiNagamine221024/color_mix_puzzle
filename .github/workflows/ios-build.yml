# EAS Build の無料枠を使わず、GitHub Actions の macOS ランナーで iOS 本番 IPA を生成する。
# 手順: docs/ios-build-without-eas.md
name: iOS Production Build (without EAS Build)

on:
  workflow_dispatch:

env:
  BUNDLE_ID: com.wippeipy221024.colororder

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo / EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Create .env for production build
        run: |
          cat > .env <<'EOF'
          ADMOB_IOS_APP_ID=${{ secrets.ADMOB_IOS_APP_ID }}
          EXPO_PUBLIC_ADMOB_BANNER_IOS=${{ secrets.EXPO_PUBLIC_ADMOB_BANNER_IOS }}
          EXPO_PUBLIC_ADMOB_REWARDED_IOS=${{ secrets.EXPO_PUBLIC_ADMOB_REWARDED_IOS }}
          EXPO_PUBLIC_USE_TEST_ADS=false
          EOF

      - name: Prebuild iOS native project
        run: npx expo prebuild --platform ios --clean

      - name: Detect Xcode workspace and scheme
        id: xcode
        run: |
          WORKSPACE_PATH=$(find ios -maxdepth 1 -name '*.xcworkspace' | head -1)
          if [ -z "$WORKSPACE_PATH" ]; then
            echo "No .xcworkspace found under ios/"
            exit 1
          fi
          WORKSPACE=$(basename "$WORKSPACE_PATH")
          SCHEME="${WORKSPACE%.xcworkspace}"
          echo "workspace=$WORKSPACE" >> "$GITHUB_OUTPUT"
          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"
          echo "Using workspace=$WORKSPACE scheme=$SCHEME"

      - name: Import signing certificate and provisioning profile
        env:
          DISTRIBUTION_CERT_BASE64: ${{ secrets.DISTRIBUTION_CERT_BASE64 }}
          DISTRIBUTION_CERT_PASSWORD: ${{ secrets.DISTRIBUTION_CERT_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CERT_PATH="$RUNNER_TEMP/distribution.p12"
          echo -n "$DISTRIBUTION_CERT_BASE64" | base64 --decode -o "$CERT_PATH"
          security import "$CERT_PATH" -P "$DISTRIBUTION_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          PP_PATH="$RUNNER_TEMP/profile.mobileprovision"
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< "$(/usr/bin/security cms -D -i "$PP_PATH")")
          cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PP_UUID.mobileprovision"

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build archive
        run: |
          cd ios
          xcodebuild \
            -workspace "${{ steps.xcode.outputs.workspace }}" \
            -scheme "${{ steps.xcode.outputs.scheme }}" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/ColorOrder.xcarchive" \
            -sdk iphoneos \
            archive \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.PROVISIONING_PROFILE_NAME }}" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}"

      - name: Export IPA
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PP_NAME: ${{ secrets.PROVISIONING_PROFILE_NAME }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>uploadSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${{ env.BUNDLE_ID }}</key>
              <string>${PP_NAME}</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/ColorOrder.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: color-order-ios
          path: ${{ runner.temp }}/export/*.ipa
          if-no-files-found: error

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
